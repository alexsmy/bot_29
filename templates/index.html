<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep-Alive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse-green { animation: pulse-g 2s infinite; }
        .pulse-red { animation: pulse-r 2s infinite; }
        .pulse-yellow { animation: pulse-y 2s infinite; }
        @keyframes pulse-g { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        @keyframes pulse-r { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        @keyframes pulse-y { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="min-h-screen p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <i class="fa-solid fa-satellite-dish text-blue-500"></i>
                    Мониторинг Сервисов
                </h1>
                <p class="text-slate-400 mt-2 text-sm">Автоподдержка и отслеживание доступности URL</p>
            </div>
            <div class="text-right">
                <div class="text-sm text-slate-400">Автообновление: <span class="text-blue-400 font-semibold">Вкл (5 сек)</span></div>
                <div id="last-sync" class="text-xs text-slate-500 mt-1">Синхронизация...</div>
            </div>
        </header>

        <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Карточки будут генерироваться здесь через JS -->
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                renderStats(data.stats);
                document.getElementById('last-sync').innerText = 'Обновлено: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Ошибка получения данных:', error);
                document.getElementById('last-sync').innerText = 'Ошибка соединения';
            }
        }

        function renderStats(stats) {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            if (stats.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">Нет данных для отображения. Ожидание инициализации...</div>';
                return;
            }

            stats.forEach(stat => {
                const totalChecks = stat.success_count + stat.fail_count;
                const uptime = totalChecks > 0 ? ((stat.success_count / totalChecks) * 100).toFixed(1) : 0;
                
                let statusColor, pulseClass, icon;
                if (stat.status === 'Онлайн') {
                    statusColor = 'text-green-400'; pulseClass = 'pulse-green bg-green-500'; icon = 'fa-check-circle';
                } else if (stat.status === 'Оффлайн') {
                    statusColor = 'text-red-400'; pulseClass = 'pulse-red bg-red-500'; icon = 'fa-times-circle';
                } else {
                    statusColor = 'text-yellow-400'; pulseClass = 'pulse-yellow bg-yellow-500'; icon = 'fa-clock';
                }

                const card = `
                    <div class="glass-card rounded-xl p-6 shadow-lg transition-transform hover:scale-[1.02] duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-xl font-bold text-white">${stat.name}</h2>
                                <a href="${stat.url}" target="_blank" class="text-xs text-blue-400 hover:underline truncate block max-w-[200px]" title="${stat.url}">${stat.url}</a>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold ${statusColor}">${stat.status}</span>
                                <div class="w-3 h-3 rounded-full ${pulseClass}"></div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <div class="bg-slate-800/50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1"><i class="fa-solid fa-stopwatch mr-1"></i>Отклик</div>
                                <div class="text-lg font-semibold">${stat.response_time_ms} <span class="text-xs font-normal text-slate-500">мс</span></div>
                            </div>
                            <div class="bg-slate-800/50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1"><i class="fa-solid fa-chart-line mr-1"></i>Uptime</div>
                                <div class="text-lg font-semibold">${uptime} <span class="text-xs font-normal text-slate-500">%</span></div>
                            </div>
                            <div class="bg-slate-800/50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1"><i class="fa-solid fa-server mr-1"></i>Код ответа</div>
                                <div class="text-lg font-semibold">${stat.status_code || '-'}</div>
                            </div>
                            <div class="bg-slate-800/50 p-3 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1"><i class="fa-solid fa-check-double mr-1"></i>Проверок</div>
                                <div class="text-lg font-semibold">${totalChecks}</div>
                            </div>
                        </div>
                        
                        <div class="mt-4 pt-4 border-t border-slate-700/50 text-xs text-slate-400 flex justify-between">
                            <span>Последняя проверка:</span>
                            <span>${stat.last_checked || 'Ожидание...'}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Запуск
        fetchStats();
        setInterval(fetchStats, 5000); // Обновление каждые 5 секунд
    </script>
</body>
</html>
