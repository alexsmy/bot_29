<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Radio 🎵</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        (function () {
            const version = String(Date.now());
            window.__ASSET_VERSION__ = version;

            const style = document.createElement('link');
            style.rel = 'stylesheet';
            style.href = `css/main.css?v=${version}`;
            document.head.appendChild(style);

            const script = document.createElement('script');
            script.type = 'module';
            script.src = `js/main.js?v=${version}`;
            document.head.appendChild(script);
        })();
    </script>

</head>
<body>

    <div id="dynamic-background"></div>

    <div class="main-container">
        <h1 class="glass-text">Vibe Radio</h1>

        <div class="equalizer-container glass-panel">
            <div class="equalizer" id="equalizer">
                <div class="column"><div></div></div>
                <div class="column"><div></div></div>
                <div class="column"><div></div></div>
                <div class="column"><div></div></div>
                <div class="column"><div></div></div>
            </div>
        </div>

        <div class="station-info-container">
            <div id="radio-logo" class="glass-card" style="display: none;">

                <div class="logo-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                </div>
                <img src="" alt="Radio Logo" style="display: none;">
            </div>
        </div>

        <div class="controls-wrapper">
            <button id="open-menu" class="radio-menu-button glass-button">
                <span class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </span>
                <span class="btn-text">Выбрать станцию</span>
                <span class="chevron">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </span>
            </button>

            <div class="radio-menu glass-panel" id="radio-menu"></div>
        </div>

        <audio id="radio-player" crossorigin="anonymous" preload="metadata" playsinline webkit-playsinline></audio>

        <div class="player-controls glass-panel">
            <div class="playback-controls">
                <button id="btn-stop" class="control-btn sub-btn" title="Остановить">

                </button>
                <button id="btn-play" class="control-btn main-btn" title="Воспроизвести / Пауза">

                </button>
            </div>

            <div class="time-display glass-inset" id="player-timer">00:00</div>

            <div class="volume-control">
                <button id="volume-icon" class="control-btn icon-only">

                </button>
                <div class="slider-container">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>

        <button id="search-button" class="glass-button small">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span>Поиск станций</span>
        </button>
    </div>

    <div id="search-modal" class="glass-modal-overlay">
        <div class="glass-modal-content">
            <button id="close-modal" class="close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <h2>Поиск радио</h2>
            <div class="search-bar">
                <input type="text" id="search-input" class="glass-input" placeholder="Название или жанр...">
                <button id="search-start" class="glass-button primary">Найти</button>
            </div>
            <button id="reset-default" class="text-link">Сбросить список</button>
            <div id="search-results" class="results-container custom-scroll"></div>
        </div>
    </div>

</body>
</html>
