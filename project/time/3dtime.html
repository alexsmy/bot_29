<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Галактические Часы</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000; 
      font-family: 'Arial', sans-serif;
    }
    
    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
      backdrop-filter: blur(5px);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: opacity 0.3s;
    }
    
    .controls:hover {
      opacity: 1;
    }
    
    .controls h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      text-align: center;
      color: #8ab4ff;
    }
    
    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    
    input[type="range"] {
      width: 150px;
      cursor: pointer;
    }
    
    input[type="checkbox"] {
      cursor: pointer;
    }
    
    input[type="color"] {
      width: 25px;
      height: 25px;
      border: none;
      cursor: pointer;
    }
    
    select {
      background: rgba(30, 30, 30, 0.7);
      color: white;
      border: 1px solid #444;
      padding: 3px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .info {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 14px;
      text-align: right;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      backdrop-filter: blur(5px);
      opacity: 0.8;
      transition: opacity 0.3s;
    }
    
    .info:hover {
      opacity: 1;
    }
    
    .digital-time {
      font-size: 24px;
      font-weight: bold;
      color: #8ab4ff;
      text-shadow: 0 0 8px rgba(138, 180, 255, 0.7);
      margin-bottom: 5px;
    }
    
    .date {
      margin-bottom: 10px;
      font-size: 16px;
    }
    
    .loading-screen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      transition: opacity 1s;
    }
    
    .loader {
      width: 150px;
      height: 150px;
      border: 5px solid transparent;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div>Загрузка галактических часов...</div>
  </div>

  <div class="controls">
    <h3>Настройки</h3>
    <label>
      Зум
      <input id="zoomSlider" type="range" min="10" max="100" value="60">
    </label>
    <label>
      Скорость частиц
      <input id="particleSpeed" type="range" min="0" max="5" step="0.1" value="1">
    </label>
    <label>
      Размер частиц
      <input id="particleSize" type="range" min="0.1" max="3" step="0.1" value="0.8">
    </label>
    <label>
      Кол-во частиц
      <input id="particleCount" type="range" min="100" max="2000" step="100" value="700">
    </label>
    <label>
      Свечение
      <input id="glowIntensity" type="range" min="0" max="2" step="0.1" value="1">
    </label>
    <label>
      Тема часов
      <select id="clockTheme">
        <option value="classic">Классика</option>
        <option value="neon">Неон</option>
        <option value="galaxy">Галактика</option>
        <option value="minimal">Минимализм</option>
      </select>
    </label>
    <label>
      Вращение сферы
      <input id="autoRotate" type="checkbox" checked>
    </label>
    <label>
      Цвет частиц
      <input id="particleColor" type="color" value="#8ab4ff">
    </label>
  </div>

  <div class="info">
    <div class="digital-time" id="digitalTime">00:00:00</div>
    <div class="date" id="currentDate">01.01.2023</div>
    <div id="timezone">UTC+0</div>
  </div>

  <!-- Подключаем библиотеки через CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script>
    // Настройка сцены, камеры и рендера
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.set(0, 0, 60);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Настройка постобработки для эффекта свечения
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.5, // интенсивность
      0.4, // радиус
      0.85  // порог
    );
    
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // Управление с помощью мыши/сенсорного ввода
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 10;
    controls.maxDistance = 100;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // Создаем космический фон со звездами
    const starGeometry = new THREE.BufferGeometry();
    const starVertices = [];
    for (let i = 0; i < 10000; i++) {
        const x = THREE.MathUtils.randFloatSpread(2000);
        const y = THREE.MathUtils.randFloatSpread(2000);
        const z = THREE.MathUtils.randFloatSpread(2000);
        starVertices.push(x, y, z);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const starMaterial = new THREE.PointsMaterial({
        color: 0xFFFFFF,
        size: 0.7,
        transparent: true
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Создаём "хрустальную" сферу с эффектом преломления
    const sphereGeometry = new THREE.SphereGeometry(30, 128, 128);
    const sphereMaterial = new THREE.MeshPhysicalMaterial({
        color: 0x223344,
        transparent: true,
        opacity: 0.3,
        metalness: 0.2,
        roughness: 0.1,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1,
        reflectivity: 1.0,
        ior: 1.5, // Индекс преломления (как у стекла)
        side: THREE.DoubleSide
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(sphere);

    // Атмосфера вокруг сферы
    const atmosphereGeometry = new THREE.SphereGeometry(32, 128, 128);
    const atmosphereMaterial = new THREE.ShaderMaterial({
        vertexShader: `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.6 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 4.0);
                gl_FragColor = vec4(0.1, 0.5, 1.0, 1.0) * intensity;
            }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true
    });
    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    scene.add(atmosphere);

    // Создание кольца Сатурна вокруг сферы
    const ringGeometry = new THREE.RingGeometry(38, 45, 128);
    const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0xaaccff,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.3
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // Освещение сцены
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    
    // Направленный свет для создания бликов
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(50, 50, 50);
    scene.add(directionalLight);
    
    // Точечные источники света для драматического освещения
    const blueLight = new THREE.PointLight(0x3366ff, 2, 100);
    blueLight.position.set(50, -30, 20);
    scene.add(blueLight);
    
    const purpleLight = new THREE.PointLight(0xff33ff, 2, 100);
    purpleLight.position.set(-50, 30, 20);
    scene.add(purpleLight);

    // Создаём лицевую панель (циферблат) часов
    const clockGroup = new THREE.Group();
    scene.add(clockGroup);
    
    const clockFaceGeometry = new THREE.CircleGeometry(15, 64);
    const clockFaceTexture = new THREE.CanvasTexture(createClockFaceTexture());
    const clockFaceMaterial = new THREE.MeshBasicMaterial({
        map: clockFaceTexture,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.9
    });
    const clockFace = new THREE.Mesh(clockFaceGeometry, clockFaceMaterial);
    clockFace.position.z = -0.01;
    clockGroup.add(clockFace);

    // Функция для создания текстуры циферблата
    function createClockFaceTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const context = canvas.getContext('2d');
        
        // Фон
        context.fillStyle = 'rgba(20, 30, 50, 0.8)';
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // Градиент для края
        const gradient = context.createRadialGradient(256, 256, 230, 256, 256, 256);
        gradient.addColorStop(0, 'rgba(50, 100, 200, 0.2)');
        gradient.addColorStop(1, 'rgba(80, 150, 255, 0.6)');
        
        context.fillStyle = gradient;
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // Внутренний круг
        context.fillStyle = 'rgba(10, 20, 40, 0.8)';
        context.beginPath();
        context.arc(256, 256, 220, 0, 2 * Math.PI);
        context.fill();
        
        // Цифры
        context.font = 'bold 36px Arial';
        context.fillStyle = 'white';
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        
        for (let i = 1; i <= 12; i++) {
            const angle = (i - 3) * (Math.PI / 6);
            const x = 256 + Math.cos(angle) * 180;
            const y = 256 + Math.sin(angle) * 180;
            context.fillText(i.toString(), x, y);
        }
        
        // Маленькие метки минут
        context.strokeStyle = 'rgba(200, 200, 200, 0.8)';
        context.lineWidth = 2;
        
        for (let i = 0; i < 60; i++) {
            const angle = i * (Math.PI / 30);
            const length = i % 5 === 0 ? 15 : 8;
            
            context.beginPath();
            context.moveTo(256 + Math.cos(angle) * (220 - length), 256 + Math.sin(angle) * (220 - length));
            context.lineTo(256 + Math.cos(angle) * 220, 256 + Math.sin(angle) * 220);
            context.stroke();
        }
        
        // Логотип или бренд часов
        context.font = '20px Arial';
        context.fillStyle = 'rgba(150, 200, 255, 0.9)';
        context.fillText('GALACTIC TIME', 256, 160);
        
        return canvas;
    }

    // Функция для создания стрелки часов
    function createHand(length, width, color, tipLength = 0, tipColor = null) {
        const group = new THREE.Group();
        
        // Основная часть стрелки
        const handGeometry = new THREE.BoxGeometry(width, length * 0.8, width * 0.5);
        handGeometry.translate(0, length * 0.4, 0);
        const handMaterial = new THREE.MeshStandardMaterial({ 
            color: color,
            metalness: 0.7,
            roughness: 0.3
        });
        const hand = new THREE.Mesh(handGeometry, handMaterial);
        group.add(hand);
        
        // Декоративная часть на конце стрелки
        if (tipLength > 0) {
            const tipGeometry = new THREE.ConeGeometry(width * 1.2, tipLength, 8);
            tipGeometry.translate(0, length * 0.8 + tipLength * 0.5, 0);
            const tipMaterial = new THREE.MeshStandardMaterial({ 
                color: tipColor || color,
                metalness: 0.8,
                roughness: 0.2
            });
            const tip = new THREE.Mesh(tipGeometry, tipMaterial);
            group.add(tip);
        }
        
        // Круглое основание стрелки
        const baseGeometry = new THREE.CylinderGeometry(width * 2, width * 2, width, 16);
        baseGeometry.rotateX(Math.PI / 2);
        const baseMaterial = new THREE.MeshStandardMaterial({ 
            color: color,
            metalness: 0.8,
            roughness: 0.2
        });
        const base = new THREE.Mesh(baseGeometry, baseMaterial);
        group.add(base);
        
        return group;
    }

    // Создаём стильные стрелки часов
    const hourHand = createHand(8, 0.8, 0xffaa00, 1.5, 0xff8800);
    const minuteHand = createHand(12, 0.6, 0x33ccff, 2, 0x00aaff);
    const secondHand = createHand(14, 0.3, 0xff3366, 2.5, 0xff0044);
    
    hourHand.position.z = 0.3;
    minuteHand.position.z = 0.4;
    secondHand.position.z = 0.5;
    
    clockGroup.add(hourHand);
    clockGroup.add(minuteHand);
    clockGroup.add(secondHand);
    
    // Центральная ось часов (декоративный элемент)
    const centerPinGeometry = new THREE.SphereGeometry(1, 16, 16);
    const centerPinMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xdddddd,
        metalness: 1.0,
        roughness: 0.1,
        envMapIntensity: 1.0
    });
    const centerPin = new THREE.Mesh(centerPinGeometry, centerPinMaterial);
    centerPin.position.z = 0.6;
    clockGroup.add(centerPin);

    // Создание анимационных частиц
    let particles;
    let particlesGeometry;
    let particlesMaterial;
    
    function createParticles(count = 700) {
        // Удаляем предыдущие частицы, если они существуют
        if (particles) {
            scene.remove(particles);
            particlesGeometry.dispose();
            particlesMaterial.dispose();
        }
        
        particlesGeometry = new THREE.BufferGeometry();
        const positions = [];
        const velocities = [];
        const sizes = [];
        
        for (let i = 0; i < count; i++) {
            // Распределяем частицы равномерно по сфере
            const phi = Math.acos(2 * Math.random() - 1);
            const theta = 2 * Math.PI * Math.random();
            const radius = 30 + (Math.random() * 2 - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            positions.push(x, y, z);
            
            // Скорость для анимации
            velocities.push(
                (Math.random() - 0.5) * 0.05,
                (Math.random() - 0.5) * 0.05,
                (Math.random() - 0.5) * 0.05
            );
            
            // Разные размеры частиц
            sizes.push(0.3 + Math.random() * 1.5);
        }
        
        particlesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
        particlesGeometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
        
        // Текстура частицы с мягким свечением
        const particleTexture = new THREE.CanvasTexture(createParticleTexture());
        
        particlesMaterial = new THREE.PointsMaterial({
            color: getElementValue('particleColor'),
            size: parseFloat(getElementValue('particleSize')),
            map: particleTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
    }
    
    // Создание текстуры для частицы с мягким свечением
    function createParticleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const context = canvas.getContext('2d');
        
        // Радиальный градиент для эффекта свечения
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
        gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
        gradient.addColorStop(0.7, 'rgba(255, 255, 255, 0.3)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        
        return canvas;
    }
    
    // Вспомогательная функция для получения значений элементов
    function getElementValue(id) {
        return document.getElementById(id).value;
    }
    
    // Обработка зума через слайдер и синхронизация с OrbitControls
    let sliderActive = false;
    const zoomSlider = document.getElementById("zoomSlider");
    zoomSlider.addEventListener("mousedown", () => { sliderActive = true; });
    zoomSlider.addEventListener("touchstart", () => { sliderActive = true; });
    zoomSlider.addEventListener("mouseup", () => { sliderActive = false; });
    zoomSlider.addEventListener("touchend", () => { sliderActive = false; });

    zoomSlider.addEventListener("input", function() {
        const distance = parseFloat(zoomSlider.value);
        const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
        camera.position.copy(controls.target).addScaledVector(dir, distance);
        controls.update();
    });

    // Обработчики для остальных элементов управления
    document.getElementById("particleSpeed").addEventListener("input", function() {
        // Скорость обрабатывается в функции анимации
    });
    
    document.getElementById("particleSize").addEventListener("input", function() {
        if (particlesMaterial) {
            particlesMaterial.size = parseFloat(this.value);
        }
    });
    
    document.getElementById("particleCount").addEventListener("input", function() {
        createParticles(parseInt(this.value));
    });
    
    document.getElementById("glowIntensity").addEventListener("input", function() {
        bloomPass.strength = parseFloat(this.value);
    });
    
    document.getElementById("autoRotate").addEventListener("change", function() {
        controls.autoRotate = this.checked;
    });
    
    document.getElementById("particleColor").addEventListener("input", function() {
        if (particlesMaterial) {
            particlesMaterial.color.set(this.value);
        }
    });
    
    document.getElementById("clockTheme").addEventListener("change", function() {
        applyClockTheme(this.value);
    });
    
    // Применение темы к часам
    function applyClockTheme(theme) {
        switch (theme) {
            case "classic":
                clockFaceMaterial.map = new THREE.CanvasTexture(createClockFaceTexture());
                hourHand.children[0].material.color.set(0xffaa00);
                minuteHand.children[0].material.color.set(0x33ccff);
                secondHand.children[0].material.color.set(0xff3366);
                sphereMaterial.color.set(0x223344);
                break;
                
            case "neon":
                clockFaceMaterial.map = new THREE.CanvasTexture(createNeonClockFace());
                hourHand.children[0].material.color.set(0xff00ff);
                minuteHand.children[0].material.color.set(0x00ffff);
                secondHand.children[0].material.color.set(0xffff00);
                sphereMaterial.color.set(0x000022);
                break;
                
            case "galaxy":
                clockFaceMaterial.map = new THREE.CanvasTexture(createGalaxyClockFace());
                hourHand.children[0].material.color.set(0xff6600);
                minuteHand.children[0].material.color.set(0x4488ff);
                secondHand.children[0].material.color.set(0xff0066);
                sphereMaterial.color.set(0x110022);
                break;
                
            case "minimal":
                clockFaceMaterial.map = new THREE.CanvasTexture(createMinimalClockFace());
                hourHand.children[0].material.color.set(0xffffff);
                minuteHand.children[0].material.color.set(0xffffff);
                secondHand.children[0].material.color.set(0xff4444);
                sphereMaterial.color.set(0x111111);
                break;
        }
        
        // Также меняем цвета для других частей часов
        if (hourHand.children[2]) hourHand.children[2].material.color.copy(hourHand.children[0].material.color);
        if (minuteHand.children[2]) minuteHand.children[2].material.color.copy(minuteHand.children[0].material.color);
        if (secondHand.children[2]) secondHand.children[2].material.color.copy(secondHand.children[0].material.color);
        
        if (hourHand.children[1]) hourHand.children[1].material.color.copy(hourHand.children[0].material.color).multiplyScalar(1.2);
        if (minuteHand.children[1]) minuteHand.children[1].material.color.copy(minuteHand.children[0].material.color).multiplyScalar(1.2);
        if (secondHand.children[1]) secondHand.children[1].material.color.copy(secondHand.children[0].material.color).multiplyScalar(1.2);
    }
    
    // Различные стили циферблата для разных тем
    function createNeonClockFace() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const context = canvas.getContext('2d');
        
        // Фон
        context.fillStyle = 'rgba(0, 0, 20, 0.9)';
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // Неоновое свечение по краю
        const gradient = context.createRadialGradient(256, 256, 200, 256, 256, 256);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
        gradient.addColorStop(0.7, 'rgba(80, 0, 180, 0.3)');
        gradient.addColorStop(0.9, 'rgba(180, 80, 255, 0.5)');
        gradient.addColorStop(1, 'rgba(255, 100, 255, 0.8)');
        
        context.fillStyle = gradient;
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // Неоновая сетка
        context.strokeStyle = 'rgba(0, 255, 255, 0.5)';
        context.lineWidth = 1;
        
        for (let i = 0; i < 360; i += 15) {
            const angle = i * Math.PI / 180;
            context.beginPath();
            context.moveTo(256, 256);
            context.lineTo(256 + Math.cos(angle) * 240, 256 + Math.sin(angle) * 240);
            context.stroke();
        }
        
        // Часовые метки в неоновом стиле
        for (let i = 1; i <= 12; i++) {
            const angle = (i - 3) * (Math.PI / 6);
            const x = 256 + Math.cos(angle) * 190;
            const y = 256 + Math.sin(angle) * 190;
            
            // Светящийся неоновый круг
            context.beginPath();
            context.arc(x, y, 15, 0, 2 * Math.PI);
            const circleGradient = context.createRadialGradient(x, y, 0, x, y, 15);
            circleGradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            circleGradient.addColorStop(0.3, 'rgba(255, 100, 255, 0.8)');
            circleGradient.addColorStop(1, 'rgba(180, 0, 255, 0)');
            context.fillStyle = circleGradient;
            context.fill();
            
            // Номер часа
            context.font = 'bold 28px Arial';
            context.fillStyle = 'rgba(255, 255, 255, 0.9)';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(i.toString(), x, y);
        }
        
        // Логотип в неоновом стиле
        context.font = '24px Arial';
        const neonTextGradient = context.createLinearGradient(150, 160, 350, 160);
        neonTextGradient.addColorStop(0, '#ff00ff');
        neonTextGradient.addColorStop(0.5, '#00ffff');
        neonTextGradient.addColorStop(1, '#ff00ff');
        context.fillStyle = neonTextGradient;
        context.fillText('NEON CHRONO', 256, 160);
        
        return canvas;
    }
    
    function createGalaxyClockFace() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const context = canvas.getContext('2d');
        
        // Фон с имитацией галактики
        context.fillStyle = 'rgba(5, 5, 15, 0.9)';
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // "Звёзды" на циферблате
        for (let i = 0; i < 300; i++) {
            const r = Math.random() * 240;
            const angle = Math.random() * Math.PI * 2;
            const x = 256 + Math.cos(angle) * r;
            const y = 256 + Math.sin(angle) * r;
            const size = Math.random() * 2 + 0.5;
            
            context.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.8 + 0.2})`;
            context.beginPath();
            context.arc(x, y, size, 0, 2 * Math.PI);
            context.fill();
        }
        
        // Спиральная галактика - рисуем спирали
        for (let i = 0; i < 2; i++) {
            const startAngle = i * Math.PI;
            context.strokeStyle = 'rgba(70, 100, 255, 0.3)';
            context.lineWidth = 6;
            
            for (let r = 10; r < 200; r += 5) {
                const angle = startAngle + (r / 30);
                const x = 256 + Math.cos(angle) * r;
                const y = 256 + Math.sin(angle) * r;
                
                context.beginPath();
                context.arc(x, y, 5, 0, 2 * Math.PI);
                context.stroke();
            }
        }
        
        // Часовые метки
        for (let i = 1; i <= 12; i++) {
            const angle = (i - 3) * (Math.PI / 6);
            const x = 256 + Math.cos(angle) * 200;
            const y = 256 + Math.sin(angle) * 200;
            
            // Светящиеся круги вокруг цифр
            context.beginPath();
            context.arc(x, y, 20, 0, 2 * Math.PI);
            const circleGradient = context.createRadialGradient(x, y, 0, x, y, 20);
            circleGradient.addColorStop(0, 'rgba(100, 150, 255, 0.8)');
            circleGradient.addColorStop(1, 'rgba(50, 100, 200, 0)');
            context.fillStyle = circleGradient;
            context.fill();
            
            // Номер часа
            context.font = 'bold 30px Arial';
            context.fillStyle = 'rgba(220, 230, 255, 0.9)';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(i.toString(), x, y);
        }
        
        // Логотип
        context.font = 'bold 26px Arial';
        context.fillStyle = 'rgba(150, 200, 255, 0.9)';
        context.fillText('COSMIC TIMEKEEPER', 256, 160);
        
        return canvas;
    }
    
    function createMinimalClockFace() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const context = canvas.getContext('2d');
        
        // Фон
        context.fillStyle = 'rgba(20, 20, 20, 0.9)';
        context.beginPath();
        context.arc(256, 256, 256, 0, 2 * Math.PI);
        context.fill();
        
        // Тонкое кольцо по краю
        context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        context.lineWidth = 2;
        context.beginPath();
        context.arc(256, 256, 240, 0, 2 * Math.PI);
        context.stroke();
        
        // Минимальные метки часов - только линии
        for (let i = 0; i < 12; i++) {
            const angle = i * (Math.PI / 6);
            context.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            context.lineWidth = i % 3 === 0 ? 3 : 1;
            
            context.beginPath();
            context.moveTo(256 + Math.cos(angle) * 210, 256 + Math.sin(angle) * 210);
            context.lineTo(256 + Math.cos(angle) * 240, 256 + Math.sin(angle) * 240);
            context.stroke();
        }
        
        // Только номера 12, 3, 6, 9
        context.font = '28px Arial';
        context.fillStyle = 'rgba(255, 255, 255, 0.8)';
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        
        const mainHours = [12, 3, 6, 9];
        for (let i = 0; i < mainHours.length; i++) {
            const hour = mainHours[i];
            const angle = (hour - 3) * (Math.PI / 6);
            const x = 256 + Math.cos(angle) * 180;
            const y = 256 + Math.sin(angle) * 180;
            context.fillText(hour.toString(), x, y);
        }
        
        // Минимальный бренд
        context.font = '20px Arial';
        context.fillStyle = 'rgba(255, 255, 255, 0.5)';
        context.fillText('MINIMALIST', 256, 160);
        
        return canvas;
    }

    // Обновление текста цифровых часов и даты
    function updateDigitalTimeAndDate() {
        const now = new Date();
        
        // Форматирование цифрового времени
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('digitalTime').textContent = `${hours}:${minutes}:${seconds}`;
        
        // Форматирование даты
        const day = now.getDate().toString().padStart(2, '0');
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const year = now.getFullYear();
        document.getElementById('currentDate').textContent = `${day}.${month}.${year}`;
        
        // Часовой пояс
        const timezone = now.toLocaleTimeString('ru-RU', {timeZoneName: 'short'}).split(' ')[1];
        document.getElementById('timezone').textContent = timezone;
    }

    // Функция анимации
    function animate() {
        requestAnimationFrame(animate);
        
        // Обновление элементов управления
        controls.update();
        
        // Если слайдер не используется, обновляем его значение
        if (!sliderActive) {
            const currentDistance = camera.position.distanceTo(controls.target);
            zoomSlider.value = currentDistance;
        }
        
        // Анимация частиц
        if (particles && particlesGeometry) {
            const positions = particlesGeometry.attributes.position.array;
            const velocities = particlesGeometry.attributes.velocity.array;
            const speedFactor = parseFloat(getElementValue('particleSpeed')) * 0.5;
            
            for (let i = 0; i < positions.length; i += 3) {
                positions[i] += velocities[i] * speedFactor;
                positions[i + 1] += velocities[i + 1] * speedFactor;
                positions[i + 2] += velocities[i + 2] * speedFactor;
                
                // Если частица слишком далеко от сферы - возвращаем ее к поверхности
                const distance = Math.sqrt(
                    positions[i] * positions[i] + 
                    positions[i + 1] * positions[i + 1] + 
                    positions[i + 2] * positions[i + 2]
                );
                
                if (distance < 29 || distance > 36) {
                    // Нормализуем позицию и устанавливаем расстояние 30-32
                    const norm = 1 / distance;
                    const newDistance = 30 + Math.random() * 2;
                    positions[i] *= norm * newDistance;
                    positions[i + 1] *= norm * newDistance;
                    positions[i + 2] *= norm * newDistance;
                    
                    // Новое случайное направление скорости
                    velocities[i] = (Math.random() - 0.5) * 0.05;
                    velocities[i + 1] = (Math.random() - 0.5) * 0.05;
                    velocities[i + 2] = (Math.random() - 0.5) * 0.05;
                }
            }
            
            particlesGeometry.attributes.position.needsUpdate = true;
        }
        
        // Анимация кольца Сатурна
        ring.rotation.z += 0.001;
        
        // Лёгкая анимация звёзд фона
        stars.rotation.y += 0.0001;
        stars.rotation.z += 0.0002;
        
        // Получаем системное время с миллисекундами для плавного движения
        const now = new Date();
        const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
        const minutes = now.getMinutes() + seconds / 60;
        const hours = (now.getHours() % 12) + minutes / 60;
        
        // Вращение стрелок вокруг оси Z согласно системному времени
        secondHand.rotation.z = -seconds * Math.PI / 30;
        minuteHand.rotation.z = -minutes * Math.PI / 30;
        hourHand.rotation.z = -hours * Math.PI / 6;
        
        // Обновляем цифровые часы
        updateDigitalTimeAndDate();
        
        // Рендеринг через EffectComposer для получения эффекта свечения
        composer.render();
    }
    
    // Создаем частицы перед началом анимации
    createParticles();
    
    // Установка загрузочного экрана
    window.addEventListener('load', function() {
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 1000);
        }, 1000); // Небольшая задержка для демонстрации загрузочного экрана
    });
    
    // Запускаем анимацию
    animate();
    
    // Обработка изменения размеров окна
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
