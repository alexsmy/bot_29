<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileVault — Облачный диск</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/filepond@4.31.4/dist/filepond.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/project/filevault/css/filevault.css">
</head>
<body>
<main class="vault-shell">
    <header class="vault-header">
        <div class="vault-title-group">
            <a class="back-link" href="/">← Хаб проектов</a>
            <div><h1>Файловое хранилище</h1></div>
        </div>
        <div class="dashboard-grid" id="dashboardGrid">
            <div class="dashboard-card"><span class="dashboard-label">Файлы</span><span id="dashboardFiles">0</span></div>
            <div class="dashboard-card"><span class="dashboard-label">Папки</span><span id="dashboardFolders">0</span></div>
            <div class="dashboard-card"><span class="dashboard-label">Занято</span><span id="dashboardUsed">0</span></div>
            <div class="dashboard-card"><span class="dashboard-label">Свободно</span><span id="dashboardFree">0</span></div>
            <div class="dashboard-card"><span class="dashboard-label">Всего</span><span id="dashboardTotal">0</span></div>
        </div>
    </header>

    <div class="manager-layout">
        <aside class="sidebar-panel">
            <div class="panel">
                <div class="panel-heading"><div><p class="panel-kicker">Загрузка</p><h2>Добавить файлы</h2></div><button class="ghost-button" id="clearUploadButton">Очистить</button></div>
                <form id="uploadForm" class="upload-form"><input id="fileInput" type="file" multiple><button class="primary-button" id="uploadButton">Загрузить</button></form>
                <div id="uploadProgressContainer" hidden></div>
                <p class="inline-note" id="uploadFolderLabel">Корень</p>
                <div id="messageBox" class="message-box" hidden></div>
            </div>
            <div class="panel">
                <div class="panel-heading"><div><p class="panel-kicker">Папки</p><h2>Структура</h2></div><button class="ghost-button" id="folderRefreshButton">Обновить</button></div>
                <div class="folder-actions"><button class="ghost-button" id="createFolderButton">Создать</button><button class="ghost-button" id="renameFolderButton">Переименовать</button><button class="ghost-button" id="deleteFolderButton">Удалить</button></div>
                <nav class="folder-tree" id="folderTree"></nav>
            </div>
        </aside>

        <section class="explorer-panel">
            <div class="explorer-toolbar">
                <div><p class="panel-kicker">Менеджер</p><h2>Файлы</h2><p class="list-meta">Папка: <span id="currentFolderLabel">Корень</span></p></div>
                <div class="toolbar-actions">
                    <label class="search-field"><span>🔍</span><input id="searchInput" type="search" placeholder="Поиск"></label>
                    <select id="sortSelect" class="select-field"><option value="date-desc">Новые</option><option value="date-asc">Старые</option><option value="name-asc">Имя А→Я</option><option value="name-desc">Имя Я→А</option><option value="size-desc">Размер ↓</option><option value="size-asc">Размер ↑</option></select>
                    <button class="ghost-button" id="refreshButton">Обновить</button>
                </div>
            </div>

            <div class="bulk-bar" id="bulkBar" hidden>
                <div id="bulkSummary"></div>
                <div class="bulk-actions"><button class="ghost-button" id="bulkMoveButton">Переместить</button><button class="ghost-button danger" id="bulkDeleteButton">Удалить</button><button class="ghost-button" id="bulkClearButton">Снять выделение</button></div>
            </div>

            <div class="content-grid">
                <div id="filesList" class="files-list"></div>
                <aside class="details-panel" id="detailsPanel"></aside>
            </div>
        </section>
    </div>
</main>

<dialog class="vault-dialog" id="actionDialog"><form class="dialog-card" id="actionDialogForm"><div class="dialog-head"><div><p id="actionDialogSubtitle"></p><h3 id="actionDialogTitle"></h3></div><button class="dialog-close" type="button" id="actionDialogClose">×</button></div><div id="actionDialogBody"></div><div class="dialog-actions"><button class="ghost-button" type="button" id="actionDialogCancelButton">Отмена</button><button class="primary-button" type="submit" id="actionDialogConfirm">Сохранить</button></div></form></dialog>

<script src="https://cdn.jsdelivr.net/npm/filepond@4.31.4/dist/filepond.min.js"></script>
<script type="module" src="/project/filevault/js/app.js"></script>
</body>
</html>
